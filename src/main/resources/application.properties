spring.application.name=fraude-detection
spring.datasource.url=jdbc:postgresql://localhost:5432/fraude_detection
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=fraude_user
spring.datasource.password=fraude_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

# Stripe API keys ahora se leen desde variables de entorno locales
# Ejemplo de uso en tu entorno:
#   export STRIPE_SECRET_KEY=sk_test_...
#   export STRIPE_PUBLISHABLE_KEY=pk_test_...
# O en Windows:
#   set STRIPE_SECRET_KEY=sk_test_...
#   set STRIPE_PUBLISHABLE_KEY=pk_test_...
